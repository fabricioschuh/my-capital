services:
  - type: web
    name: my-capital-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: EXCHANGE_RATE_PROVIDER
        value: frankfurter
      - key: EXCHANGE_RATE_CACHE_TTL
        value: 3600
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set these manually in the Render dashboard (sensitive):
      # AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      # AUTH_USERNAME, AUTH_PASSWORD_HASH, JWT_SECRET, CORS_ORIGINS
